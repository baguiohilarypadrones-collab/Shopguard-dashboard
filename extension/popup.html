<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>ShopGuard</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      width: 360px;

      min-height: 500px;

      background: #0f172a;

      color: white;

      font-family: Arial, sans-serif;

      padding: 16px;
    }

    .header {

      text-align: center;

      margin-bottom: 20px;
    }

    .logo {

      font-size: 28px;

      font-weight: bold;

      color: #06b6d4;

      margin-bottom: 6px;
    }

    .subtitle {

      color: #94a3b8;

      font-size: 14px;
    }

    .scan-btn {

      width: 100%;

      padding: 14px;

      border: none;

      border-radius: 12px;

      background: #06b6d4;

      color: white;

      font-size: 16px;

      font-weight: bold;

      cursor: pointer;

      transition: 0.2s;
    }

    .scan-btn:hover {

      background: #0891b2;
    }

    .status {

      margin-top: 14px;

      text-align: center;

      font-size: 14px;

      font-weight: bold;
    }

    .result {

      margin-top: 16px;
    }

    .footer {

      margin-top: 20px;

      padding-top: 12px;

      border-top: 1px solid #334155;

      text-align: center;

      color: #64748b;

      font-size: 12px;
    }

    .warning-box {

      margin-top: 14px;

      padding: 10px;

      border-radius: 10px;

      background: rgba(239, 68, 68, 0.15);

      border: 1px solid rgba(239, 68, 68, 0.3);

      color: #fca5a5;

      font-size: 13px;
    }

  </style>

</head>

<body>

  <!-- HEADER -->
  <div class="header">

    <div class="logo">
      SHOPGUARD
    </div>

    <div class="subtitle">
      Scam & Dark Pattern Detector
    </div>

  </div>

  <!-- SCAN BUTTON -->
  <button
    id="scanBtn"
    class="scan-btn"
  >
    Scan Current Product
  </button>

  <!-- STATUS -->
  <div
    id="status"
    class="status"
  >
    Ready to scan
  </div>

  <!-- RESULT -->
  <div
    id="result"
    class="result"
  ></div>

  <!-- WARNING -->
  <div class="warning-box">

    Supported Platforms:
    <br />
    • Shopee
    <br />
    • Lazada

  </div>

  <!-- FOOTER -->
  <div class="footer">

    ShopGuard Extension v1.0

  </div>

  <!-- SCRIPT -->
  <script src="popup.js"></script>

</body>

</html>
